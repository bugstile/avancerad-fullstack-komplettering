name: CI/CD

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    name: Test backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: startkod/api/package-lock.json

      - name: Install dependencies
        working-directory: startkod/api
        run: npm ci

      - name: Run tests
        working-directory: startkod/api
        run: npm test

  test-frontend:
    name: Test & build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: startkod/frontend/package-lock.json

      - name: Install dependencies
        working-directory: startkod/frontend
        run: npm ci

      - name: Run tests
        working-directory: startkod/frontend
        run: npm test

      - name: Build
        working-directory: startkod/frontend
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-api, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  codeql:
    name: CodeQL-analys
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  docs:
    name: Generera API-dokumentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: startkod/api/package-lock.json

      - name: Install dependencies
        working-directory: startkod/api
        run: npm ci

      - name: Generate OpenAPI spec
        working-directory: startkod/api
        run: npm run docs

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: startkod/api/openapi.json

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
